services:
  proxy:
    build:
      context: .
      dockerfile: litellm-proxy/Dockerfile
    ports:
      - "4000:4000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/litellm
      SPRING_DATASOURCE_USERNAME: litellm
      SPRING_DATASOURCE_PASSWORD: litellm
      LITELLM_CONFIG: /app/config.yaml
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-master-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Uncomment after setting `redis_url: redis://redis:6379` in config.yaml
      # SPRING_REDIS_URL: redis://redis:6379
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      # redis:
      #   condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Uncomment for multi-replica deployments — see config.yaml's redis_url.
  # redis:
  #   image: redis:7-alpine
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 3s
  #     timeout: 3s
  #     retries: 10

volumes:
  pgdata:
